<!-- Remplace tout le div class="card-visual visual-mech" par ceci -->

<div class="card-visual visual-mech">
  <div class="grid-dots"></div>

  <div class="pdf-carousel" style="position:relative;z-index:1;width:100%;">

    <!-- Slides -->
    <div class="pdf-slides">
      <div class="pdf-slide active">
        <iframe src="assets/images/montee_charge_plan_global_LOT1.pdf#toolbar=0&navpanes=0&scrollbar=0"></iframe>
      </div>
      <div class="pdf-slide">
        <iframe src="assets/images/guidage_rotation_vis_LOT1.pdf#toolbar=0&navpanes=0&scrollbar=0"></iframe>
      </div>
      <div class="pdf-slide">
        <iframe src="assets/images/plan_global_LOT2.pdf#toolbar=0&navpanes=0&scrollbar=0"></iframe>
      </div>
      <div class="pdf-slide">
        <iframe src="assets/images/poulie_courroie.pdf#toolbar=0&navpanes=0&scrollbar=0"></iframe>
      </div>
    </div>

    <!-- Label du slide courant -->
    <div class="pdf-label-bar">
      <span class="pdf-current-label">Plan Global — LOT 1</span>
      <span class="pdf-counter">1 / 4</span>
    </div>

    <!-- Contrôles -->
    <div class="pdf-controls">
      <button class="pdf-btn" onclick="movePdf(-1)">
        <i class="fa-solid fa-chevron-left"></i>
      </button>

      <!-- Dots -->
      <div class="pdf-dots">
        <span class="pdf-dot active" onclick="gotoPdf(0)"></span>
        <span class="pdf-dot" onclick="gotoPdf(1)"></span>
        <span class="pdf-dot" onclick="gotoPdf(2)"></span>
        <span class="pdf-dot" onclick="gotoPdf(3)"></span>
      </div>

      <button class="pdf-btn" onclick="movePdf(1)">
        <i class="fa-solid fa-chevron-right"></i>
      </button>
    </div>

  </div>
</div>

<!-- ═══════════════════════════
     CSS — colle dans ton <style>
═══════════════════════════ -->
<style>
.pdf-carousel { display: flex; flex-direction: column; gap: 10px; }

.pdf-slides { position: relative; width: 100%; }

.pdf-slide {
  display: none;
  width: 100%; height: 320px;
  border-radius: 14px; overflow: hidden;
  border: 1px solid rgba(255,255,255,0.12);
  box-shadow: 0 12px 40px rgba(0,0,0,0.5);
  background: rgba(255,255,255,0.04);
}
.pdf-slide.active { display: block; }
.pdf-slide iframe { width: 100%; height: 100%; border: none; }

/* Label + counter */
.pdf-label-bar {
  display: flex; justify-content: space-between; align-items: center;
  padding: 0 4px;
}
.pdf-current-label {
  font-size: 0.75rem; font-weight: 600;
  color: rgba(255,255,255,0.70);
  letter-spacing: 0.4px;
}
.pdf-counter {
  font-size: 0.72rem; font-weight: 500;
  color: rgba(255,255,255,0.35);
}

/* Controls row */
.pdf-controls {
  display: flex; align-items: center; justify-content: center; gap: 16px;
}

.pdf-btn {
  width: 36px; height: 36px; border-radius: 50%;
  border: 1px solid rgba(255,255,255,0.18);
  background: rgba(255,255,255,0.10);
  color: white; cursor: pointer; font-size: 0.85rem;
  display: flex; align-items: center; justify-content: center;
  transition: background 0.2s, transform 0.2s;
}
.pdf-btn:hover { background: rgba(255,255,255,0.22); transform: scale(1.08); }

.pdf-dots { display: flex; gap: 7px; }
.pdf-dot {
  width: 7px; height: 7px; border-radius: 50%;
  background: rgba(255,255,255,0.25);
  cursor: pointer; transition: background 0.25s, transform 0.25s;
}
.pdf-dot.active { background: white; transform: scale(1.3); }
</style>

<!-- ═══════════════════════════
     JS — colle avant </body>
═══════════════════════════ -->
<script>
const labels = [
  'Plan Global — LOT 1',
  'Guidage Rotation Vis',
  'Plan Global — LOT 2',
  'Poulie Courroie'
];

let currentPdf = 0;

function gotoPdf(index) {
  const slides = document.querySelectorAll('.pdf-slide');
  const dots   = document.querySelectorAll('.pdf-dot');
  const label  = document.querySelector('.pdf-current-label');
  const counter= document.querySelector('.pdf-counter');

  slides[currentPdf].classList.remove('active');
  dots[currentPdf].classList.remove('active');

  currentPdf = (index + slides.length) % slides.length;

  slides[currentPdf].classList.add('active');
  dots[currentPdf].classList.add('active');
  label.textContent  = labels[currentPdf];
  counter.textContent = `${currentPdf + 1} / ${slides.length}`;
}

function movePdf(dir) { gotoPdf(currentPdf + dir); }
</script>
